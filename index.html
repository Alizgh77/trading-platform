<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Trading Chart</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #000;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background-color: #f0f0f0;
      border-bottom: 1px solid #ccc;
      flex-wrap: wrap;
    }

    .section {
      margin: 4px 0;
    }

    #chart {
      height: 500px;
    }

    .center-controls {
      text-align: center;
      margin: 16px 0 0;
    }

    .metrics {
      text-align: center;
      margin-top: 12px;
      font-weight: bold;
    }

    button,
    input,
    select {
      margin: 4px;
      padding: 6px 10px;
      font-size: 14px;
    }

    input {
      width: 60px;
    }

    .form-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .spacer {
      flex-grow: 1;
    }
  </style>
</head>

<body>

  <!-- نوار بالا -->
  <div class="top-bar">

    <div class="form-inline">
      <strong>Timeframe:</strong>
      <button onclick="setTimeframe('1')">1 min </button>
      <button onclick="setTimeframe('5')">5 min</button>
      <button onclick="setTimeframe('15')">15 min</button>
    </div>
    <dive>
      <strong>CHART</strong>
    </dive>

    <div class="form-inline">
      <strong>Indicators:</strong>
      <select id="indicatorSelect">
        <option value="">Select</option>
        <option value="ema">EMA</option>

      </select>
      <button onclick="addIndicator()">Add</button>
      <button onclick="removeIndicator()">Remove</button>
    </div>

  </div>

  <!-- نوار پوزیشن‌گیری -->
  <div class="top-bar">

    <div class="form-inline">
      <label>TP%</label><input type="number" id="tpInput" placeholder="opt." />
      <label>SL%</label><input type="number" id="slInput" required />
      <label>Risk%</label><input type="number" id="riskInput" required />
    </div>

    <div class="form-inline">
      <button onclick="openPosition('buy')" style="background-color: #2196f3; color: white;">Buy</button>
      <button onclick="openPosition('sell')" style="background-color: #ff1900; color: white;">Sell</button>
      <button onclick="closePosition()" style="background-color: aliceblue;  ">Close</button>
    </div>

  </div>

  <!-- چارت -->
  <div id="chart"></div>

  <!-- کنترل‌ها زیر چارت -->
  <div class="center-controls">
    <button onclick="prevCandle()">←</button>
    <button onclick="play()">▶</button>
    <button onclick="pause()">⏸</button>
    <button onclick="nextCandle()">→</button>
  </div>

  <!-- نمایش مقادیر مالی -->
  <div class="metrics">
    Balance: $<span id="balance">10000</span> |
    Equity: $<span id="equity">10000</span> |
    Floating : $<span id="floating">0.00</span>
  </div>

  <script src="script.js"></script>
</body>

</html>
